    <button class="clear">
        <h3>General Information</h3>
        <p>Organic Décor & Crafts Co. is a small, sole-proprietor business dedicated to enhancing the local community and supporting the social livelihoods by promoting appreciation and connection to nature, various arts, and a commitment to sustainable environment based on a philosophy for peace and social bonding. This workshop does not affiliate nor collaborate with any political or religious organizations.</p>
    </button>
    <button class="white">
        <h3>Frequently-Asked Questions</h3>
        <b>Q: How long does it take to receive an order?</b>
        <p>A: That depends on the delivery method and distance to your location. Normally, production and shipping will be completed in the next two available days when the workshop is open. If this is of any concern to you, please let us know through email asking about the estimated durations. Extra fees can be negotiated for urgent, quicker deliveries.</p>
        <b>Q: Can I return or exchange an item?</b>
        <p>A: Unfortunately, items cannot be exchanged once it has been shipped or has began being crafted. Return policy depends on the types of the items. Organic materials that degrade easily cannot be returned due to oxidation and decay. Teabags and other preservable items can be returned with a 50% refund.</p>
        <b>Q: What forms of payment are accepted?</b>
        <p>A: Checks, cash, and major digital payment apps are welcome. When picking up items or receiving a service in-person, payment at that time is more preferred.</p>
        <b>Q: Can I cancel my order or booked service?</b>
        <p>A: Yes, an ordered item can be canceled with 100% refund as long as it is before production or shipping begins. Otherwise, an order can be canceled with a 50% refund. Booked services can be canceled with a full refund up to 48 hours before the reserved time slot. Beyond this limit, services can only be canceled with no refund.</p>
    </button>
    <button class="dark">
        <h3>Our Privacy Policy</h3>
        <b>Secure communication through email</b>
        <p>We will honor your preferred methods of communication. We guarantee to maintain strict withholding of any information you do not wish to share. However, we do recommend email as a relatively-safe option for matters regarding orders or bookings.</p>
        <b>Confidentiality of order and payment information</b>
        <p>We pledge and to the best of our ability prevent any posible sensitive data breaches. Once payment transactions are completed, those information will be permanently disposed. Details of your order will not be shared (unless you consent).</p>
        <b>Consent to use photographs for website and marketing purposes</b>
        <p>We may ask your permission to use certain photographs or testimonials. Customers are granted the full right to refuse or agree to take part in promoting this workshop.</p>
        <b>Right to retention of names and anonymous photographs</b>
        <p>No self-identifiable information of customers are required to be shared. Customers may use aliases for communication with us. We respect all rights to their privacy as they feel necessary.</p>
    </button>
    <button class="light">
        <h4>If you have any other questions or concerns...</h4>

    </button>
